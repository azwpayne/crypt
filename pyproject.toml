[project]
name = "crypt"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "cryptography>=46.0.5",
    "pycryptodome>=3.23.0",
    "ruff>=0.15.5",
    "ty>=0.0.22",
]

[tool.poe]
executor.type = "uv"
tasks.full = ["clean", "lint", "test"]
tasks.test = ["clean", "pytest"]
tasks.lint = "ruff check --unsafe-fixes --fix . && ruff format ."
tasks.pytest = "pytest"

tasks.clean = { shell = """
	rm -rf .pytest_cache htmlcov .coverage coverage.xml .ruff_cache .benchmarks
	find . -type d -name __pycache__ -exec rm -rf {} +
	find . -type f -name "*.pyc" -delete
""" }

[tool.pytest.ini_options]
pythonpath = ["src", "."]
testpaths = ["tests"]
asyncio_mode = "auto"              # 自动识别异步测试
timeout = 30                       # 默认 30 秒超时
addopts = """\
    --strict-markers \
    --tb=short \
    --cov=src/crypt \
    --cov-report=term-missing \
    --cov-report=html \
    --cov-report=xml \
    --cov-branch \
    """

[dependency-groups]
dev = ["poethepoet", "ruff", "ty"]
test = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "pytest-xdist",
    "pytest-mock",
    "pytest-benchmark",
    "pytest-timeout",
    "pytest-sugar",
    "pytest-factoryboy",
]